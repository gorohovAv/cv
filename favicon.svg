<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Темный космический фон со скругленными углами -->
  <rect width="100" height="100" fill="#0f172a" rx="20" />
  
  <!-- Центральная звезда -->
  <path d="M50 12 L54 24 L66 28 L54 32 L50 44 L46 32 L34 28 L46 24 Z" fill="#fbbf24" />
  
  <!-- Левая звезда (чуть меньше и прозрачнее) -->
  <path d="M24 28 L27 36 L35 39 L27 42 L24 50 L21 42 L13 39 L21 36 Z" fill="#fbbf24" opacity="0.7" />
  
  <!-- Правая звезда (чуть меньше и прозрачнее) -->
  <path d="M76 28 L79 36 L87 39 L79 42 L76 50 L73 42 L65 39 L73 36 Z" fill="#fbbf24" opacity="0.7" />
  
  <!-- Голова человечка -->
  <circle cx="50" cy="62" r="16" fill="#38bdf8" />
  
  <!-- Плечи и тело человечка -->
  <path d="M18 98 C18 74 34 68 50 68 C66 68 82 74 82 98" fill="#38bdf8" />
</svg>